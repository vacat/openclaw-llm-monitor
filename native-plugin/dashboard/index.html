<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: #2563eb;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #60a5fa;
        }
        
        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #f8fafc;
        }
        
        .stat-sub {
            font-size: 14px;
            color: #64748b;
            margin-top: 8px;
        }
        
        .stat-card.primary .stat-value {
            color: #60a5fa;
        }
        
        .stat-card.success .stat-value {
            color: #34d399;
        }
        
        .stat-card.warning .stat-value {
            color: #fbbf24;
        }
        
        .stat-card.danger .stat-value {
            color: #f87171;
        }
        
        .chart-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        
        .chart-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #f8fafc;
        }
        
        .chart {
            height: 300px;
            position: relative;
        }
        
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 100%;
            padding: 20px 0;
        }
        
        .bar {
            width: 40px;
            background: linear-gradient(to top, #3b82f6, #60a5fa);
            border-radius: 4px 4px 0 0;
            position: relative;
            transition: opacity 0.2s;
        }
        
        .bar:hover {
            opacity: 0.8;
        }
        
        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #94a3b8;
            white-space: nowrap;
        }
        
        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #f8fafc;
            font-weight: 600;
        }
        
        .table-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        
        th {
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        
        td {
            color: #e2e8f0;
        }
        
        tr:hover td {
            background: #334155;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }
        
        .badge-warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .date-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .date-selector input {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .date-selector button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 LLM Monitor Dashboard</h1>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        </header>
        
        <div class="date-selector">
            <input type="date" id="dateInput" value="">
            <button onclick="loadData()">查询</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
        </div>
        
        <div id="content">
            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="stat-label">今日调用次数</div>
                    <div class="stat-value" id="totalCalls">-</div>
                    <div class="stat-sub">次 API 调用</div>
                </div>
                
                <div class="stat-card success">
                    <div class="stat-label">总 Token 数</div>
                    <div class="stat-value" id="totalTokens">-</div>
                    <div class="stat-sub">input + output</div>
                </div>
                
                <div class="stat-card warning">
                    <div class="stat-label">估算费用</div>
                    <div class="stat-value" id="estimatedCost">-</div>
                    <div class="stat-sub">按模型定价计算</div>
                </div>
                
                <div class="stat-card danger">
                    <div class="stat-label">Cache 节省</div>
                    <div class="stat-value" id="cacheSavings">-</div>
                    <div class="stat-sub">相比无 Cache</div>
                </div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">📈 每小时调用分布</div>
                <div class="chart">
                    <div class="bar-chart" id="hourlyChart">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">🥧 模型使用分布</div>
                <div class="chart" id="modelChart">
                    <!-- 动态生成 -->
                </div>
            </div>
            
            <div class="table-container">
                <div class="chart-title">📋 最近调用记录</div>
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>模型</th>
                            <th>Token</th>
                            <th>费用</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="recentCalls">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // 设置默认日期为今天
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(2) + 'K';
            return num.toString();
        }
        
        // 格式化货币
        function formatCurrency(value, currency = '¥') {
            return currency + value.toFixed(4);
        }
        
        // 加载数据
        async function loadData() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            const date = document.getElementById('dateInput').value;
            
            loading.style.display = 'flex';
            content.style.opacity = '0.5';
            
            try {
                // 调用插件 API 获取数据
                const response = await fetch(`/api/llm-monitor/stats?date=${date}`);
                const data = await response.json();
                
                // 更新统计卡片
                document.getElementById('totalCalls').textContent = formatNumber(data.calls);
                document.getElementById('totalTokens').textContent = formatNumber(data.tokens?.total || 0);
                document.getElementById('estimatedCost').textContent = formatCurrency(data.estimatedCost || 0);
                document.getElementById('cacheSavings').textContent = formatCurrency(data.cacheSavings || 0);
                
                // 更新图表
                updateHourlyChart(data.hourly);
                updateModelChart(data.models);
                updateRecentCalls(data.recentCalls);
                
            } catch (error) {
                console.error('Failed to load data:', error);
                // 显示模拟数据
                showMockData();
            } finally {
                loading.style.display = 'none';
                content.style.opacity = '1';
            }
        }
        
        // 更新每小时图表
        function updateHourlyChart(hourlyData) {
            const container = document.getElementById('hourlyChart');
            container.innerHTML = '';
            
            const hours = hourlyData || Array(24).fill(0).map((_, i) => ({ hour: i, calls: Math.floor(Math.random() * 50) }));
            const maxCalls = Math.max(...hours.map(h => h.calls));
            
            hours.forEach(h => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = maxCalls > 0 ? `${(h.calls / maxCalls) * 100}%` : '0%';
                
                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = `${h.hour}:00`;
                
                const value = document.createElement('div');
                value.className = 'bar-value';
                value.textContent = h.calls;
                
                bar.appendChild(label);
                bar.appendChild(value);
                container.appendChild(bar);
            });
        }
        
        // 更新模型图表
        function updateModelChart(modelsData) {
            const container = document.getElementById('modelChart');
            container.innerHTML = '';
            
            const models = modelsData || [
                { name: 'k2.5', calls: 150, color: '#60a5fa' },
                { name: 'gpt-4o', calls: 80, color: '#34d399' },
                { name: 'claude-3', calls: 50, color: '#fbbf24' },
            ];
            
            // 简化的饼图表示
            const total = models.reduce((sum, m) => sum + m.calls, 0);
            
            models.forEach(m => {
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.alignItems = 'center';
                row.style.marginBottom = '10px';
                
                const percent = total > 0 ? ((m.calls / total) * 100).toFixed(1) : 0;
                
                row.innerHTML = `
                    <div style="width: 20px; height: 20px; background: ${m.color}; border-radius: 4px; margin-right: 10px;"></div>
                    <div style="flex: 1;">${m.name}</div>
                    <div style="color: #94a3b8;">${m.calls} 次 (${percent}%)</div>
                `;
                
                container.appendChild(row);
            });
        }
        
        // 更新最近调用记录
        function updateRecentCalls(calls) {
            const tbody = document.getElementById('recentCalls');
            tbody.innerHTML = '';
            
            const recentCalls = calls || [
                { time: '10:30:45', model: 'k2.5', tokens: 1500, cost: 0.05, status: 'success' },
                { time: '10:28:12', model: 'gpt-4o', tokens: 2300, cost: 0.08, status: 'success' },
                { time: '10:25:33', model: 'k2.5', tokens: 800, cost: 0.02, status: 'success' },
            ];
            
            recentCalls.forEach(call => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${call.time}</td>
                    <td>${call.model}</td>
                    <td>${formatNumber(call.tokens)}</td>
                    <td>¥${call.cost.toFixed(4)}</td>
                    <td><span class="badge badge-success">成功</span></td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 显示模拟数据
        function showMockData() {
            document.getElementById('totalCalls').textContent = '1,234';
            document.getElementById('totalTokens').textContent = '8.5M';
            document.getElementById('estimatedCost').textContent = '¥12.34';
            document.getElementById('cacheSavings').textContent = '¥45.67';
            
            updateHourlyChart(null);
            updateModelChart(null);
            updateRecentCalls(null);
        }
        
        // 初始加载
        loadData();
        
        // 自动刷新（每 30 秒）
        setInterval(loadData, 30000);
    </script>
</body>
</html>
